kind = "web"
previewPath = "/"
title = "KodNest Premium Build System"
version = "1.0.0"
id = "artifacts/kodnest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19627

[services.development]
run = "pnpm --filter @workspace/kodnest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kodnest", "run", "build" ]
publicDir = "artifacts/kodnest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19627"
BASE_PATH = "/"
